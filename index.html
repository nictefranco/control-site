<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control de Site</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

<style>
  :root{
    --bg:#ffffff;
    --panel:#ffffff;
    --panel2:#f5f5f5;
    --line:#e6e6e6;
    --text:#333333;
    --muted:#999999;
    --meli-yellow:#fff159;
    --meli-blue:#3483fa;
    --meli-blue-dark:#2968c8;
    --ok:#39b54a;
    --ok-dim:rgba(57,181,74,.10);
    --falla:#e63946;
    --falla-dim:rgba(230,57,70,.08);
    --urgente:#f5a623;
    --urgente-dim:rgba(245,166,35,.12);
    --mono:'JetBrains Mono','SF Mono',Consolas,monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Proxima Nova',Inter,-apple-system,Segoe UI,Roboto,sans-serif;}
  .app{max-width:760px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 10px;background:var(--meli-yellow);}
  .topbar h1{font-size:18px;margin:0;font-weight:800;letter-spacing:.2px;color:#2d2d2d;}
  .topbar .meta{font-size:11px;color:#4a4a4a;font-family:var(--mono);margin-top:2px;}
  .topbar-right{display:flex;align-items:center;gap:8px;}
  .icon-btn{background:#ffffff;border:1px solid rgba(0,0,0,.12);color:#5a5a5a;width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .icon-btn:hover{color:var(--text);}
  .btn-falla{background:var(--falla);color:#ffffff;border:none;border-radius:9px;padding:0 16px;height:34px;font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:0 2px 6px rgba(230,57,70,.3);}
  .btn-falla:hover{filter:brightness(1.05);}

  .banner{margin:8px 18px 4px;background:var(--urgente-dim);border:1px solid rgba(245,166,35,.4);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;color:#a86d00;}
  .banner .count{margin-left:auto;background:rgba(245,166,35,.25);padding:2px 10px;border-radius:99px;font-family:var(--mono);}

  .chips{display:flex;gap:6px;padding:14px 18px 6px;overflow-x:auto;}
  .chip{flex:none;background:var(--panel2);border:1px solid var(--line);color:var(--muted);padding:8px 14px;border-radius:99px;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .chip.active{background:var(--meli-blue);color:#fff;border-color:var(--meli-blue);}

  main{flex:1;padding:6px 18px 90px;overflow-y:auto;}
  .group-title{font-size:11px;letter-spacing:.8px;color:var(--muted);text-transform:uppercase;margin:18px 0 8px;font-weight:700;}
  .sub-title{font-size:12.5px;color:var(--text);margin:12px 0 8px;font-weight:600;opacity:.85;}
  .items{display:flex;flex-wrap:wrap;gap:8px;}
  .item{
    border:1px solid var(--line);background:var(--panel2);border-radius:10px;padding:9px 12px;
    font-size:13px;display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none;color:var(--text);
  }
  .item .dot{width:7px;height:7px;border-radius:50%;background:var(--ok);flex:none;}
  .item.falla{border-color:rgba(230,57,70,.35);background:var(--falla-dim);}
  .item.falla .dot{background:var(--falla);}
  .item.urgente{border-color:rgba(245,166,35,.55);background:var(--urgente-dim);}
  .item.urgente .dot{background:var(--urgente);}
  .item .flag{font-size:11px;opacity:.7;}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:40px 0;}

  nav.bottom{
    position:fixed;bottom:0;left:0;right:0;background:#ffffff;border-top:1px solid var(--line);
    display:flex;max-width:760px;margin:0 auto;box-shadow:0 -2px 10px rgba(0,0,0,.04);
  }
  nav.bottom button{
    flex:1;background:none;border:none;color:var(--muted);padding:12px 4px 10px;font-size:11px;font-weight:600;
    cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;font-family:inherit;position:relative;
  }
  nav.bottom button.active{color:var(--meli-blue);}
  nav.bottom svg{width:19px;height:19px;}
  .nav-badge{position:absolute;top:2px;right:18%;background:var(--falla);color:#fff;font-size:9px;font-weight:700;border-radius:99px;padding:1px 5px;min-width:14px;text-align:center;}

  /* dashboard stats */
  .stats{display:flex;gap:10px;padding:0 18px 6px;margin-top:6px;}
  .stat{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;}
  .stat .num{font-family:var(--mono);font-size:22px;font-weight:700;}
  .stat .lbl{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:1px;}
  .stat.ok .num{color:var(--ok);} .stat.falla .num{color:var(--falla);}

  /* historial */
  .hist-card{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:10px;}
  .hist-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px;}
  .hist-top .name{font-weight:700;font-size:14px;color:var(--text);}
  .pill{font-size:10px;font-weight:700;text-transform:uppercase;padding:3px 8px;border-radius:99px;flex:none;}
  .pill.pendiente{background:var(--falla-dim);color:var(--falla);}
  .pill.reparado{background:var(--ok-dim);color:var(--ok);}
  .hist-row{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.5;}
  .hist-row b{color:var(--text);font-weight:600;}

  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center;z-index:50;}
  .modal-bg.show{display:flex;}
  .modal{background:#ffffff;border:1px solid var(--line);border-radius:18px 18px 0 0;padding:22px 20px 28px;max-width:760px;width:100%;max-height:88vh;overflow-y:auto;}
  .modal h3{margin:0 0 4px;font-size:16px;color:var(--text);}
  .modal .meta-line{font-size:12px;color:var(--muted);margin-bottom:14px;font-family:var(--mono);}
  label{display:block;font-size:12px;color:var(--muted);margin:14px 0 6px;font-weight:600;}
  label:first-of-type{margin-top:0;}
  input,select,textarea{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:9px;color:var(--text);padding:11px 12px;font-size:14px;font-family:inherit;}
  textarea{resize:vertical;min-height:64px;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--meli-blue);}
  .check-row{display:flex;align-items:center;gap:8px;margin-top:14px;font-size:13px;}
  .check-row input{width:auto;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:18px;}
  .btn{padding:12px;border-radius:10px;border:none;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;}
  .btn-primary{background:var(--meli-blue);color:#ffffff;}
  .btn-primary:hover{background:var(--meli-blue-dark);}
  .btn-ok{background:var(--ok);color:#ffffff;}
  .btn-ghost{background:var(--panel2);border:1px solid var(--line);color:var(--muted);}

  .toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%) translateY(20px);background:#2d2d2d;color:#fff;border:1px solid var(--line);padding:11px 18px;border-radius:10px;font-size:13px;opacity:0;transition:.25s;z-index:60;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>

function resizeImage(file, maxW=900, quality=0.7){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        const scale = Math.min(1, maxW / img.width);
        const canvas = document.createElement('canvas');
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
