<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control de Site</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
  :root{
    --bg:#ffffff;
    --panel:#ffffff;
    --panel2:#f5f5f5;
    --line:#e6e6e6;
    --text:#333333;
    --muted:#999999;
    --meli-yellow:#fff159;
    --meli-blue:#3483fa;
    --meli-blue-dark:#2968c8;
    --ok:#39b54a;
    --ok-dim:rgba(57,181,74,.10);
    --falla:#e63946;
    --falla-dim:rgba(230,57,70,.08);
    --urgente:#f5a623;
    --urgente-dim:rgba(245,166,35,.12);
    --mono:'JetBrains Mono','SF Mono',Consolas,monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Proxima Nova',Inter,-apple-system,Segoe UI,Roboto,sans-serif;}
  .app{max-width:760px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 10px;background:var(--meli-yellow);}
  .topbar h1{font-size:18px;margin:0;font-weight:800;letter-spacing:.2px;color:#2d2d2d;}
  .topbar .meta{font-size:11px;color:#4a4a4a;font-family:var(--mono);margin-top:2px;}
  .topbar-right{display:flex;align-items:center;gap:8px;}
  .icon-btn{background:#ffffff;border:1px solid rgba(0,0,0,.12);color:#5a5a5a;width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .icon-btn:hover{color:var(--text);}
  .btn-falla{background:var(--falla);color:#ffffff;border:none;border-radius:9px;padding:0 16px;height:34px;font-weight:700;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:0 2px 6px rgba(230,57,70,.3);}
  .btn-falla:hover{filter:brightness(1.05);}

  .banner{margin:8px 18px 4px;background:var(--urgente-dim);border:1px solid rgba(245,166,35,.4);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;color:#a86d00;}
  .banner .count{margin-left:auto;background:rgba(245,166,35,.25);padding:2px 10px;border-radius:99px;font-family:var(--mono);}

  .chips{display:flex;gap:6px;padding:14px 18px 6px;overflow-x:auto;}
  .chip{flex:none;background:var(--panel2);border:1px solid var(--line);color:var(--muted);padding:8px 14px;border-radius:99px;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .chip.active{background:var(--meli-blue);color:#fff;border-color:var(--meli-blue);}

  main{flex:1;padding:6px 18px 90px;overflow-y:auto;}
  .group-title{font-size:11px;letter-spacing:.8px;color:var(--muted);text-transform:uppercase;margin:18px 0 8px;font-weight:700;}
  .sub-title{font-size:12.5px;color:var(--text);margin:12px 0 8px;font-weight:600;opacity:.85;}
  .items{display:flex;flex-wrap:wrap;gap:8px;}
  .item{
    border:1px solid var(--line);background:var(--panel2);border-radius:10px;padding:9px 12px;
    font-size:13px;display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none;color:var(--text);
  }
  .item .dot{width:7px;height:7px;border-radius:50%;background:var(--ok);flex:none;}
  .item.falla{border-color:rgba(230,57,70,.35);background:var(--falla-dim);}
  .item.falla .dot{background:var(--falla);}
  .item.urgente{border-color:rgba(245,166,35,.55);background:var(--urgente-dim);}
  .item.urgente .dot{background:var(--urgente);}
  .item .flag{font-size:11px;opacity:.7;}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:40px 0;}

  nav.bottom{
    position:fixed;bottom:0;left:0;right:0;background:#ffffff;border-top:1px solid var(--line);
    display:flex;max-width:760px;margin:0 auto;box-shadow:0 -2px 10px rgba(0,0,0,.04);
  }
  nav.bottom button{
    flex:1;background:none;border:none;color:var(--muted);padding:12px 4px 10px;font-size:11px;font-weight:600;
    cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;font-family:inherit;position:relative;
  }
  nav.bottom button.active{color:var(--meli-blue);}
  nav.bottom svg{width:19px;height:19px;}
  .nav-badge{position:absolute;top:2px;right:18%;background:var(--falla);color:#fff;font-size:9px;font-weight:700;border-radius:99px;padding:1px 5px;min-width:14px;text-align:center;}

  /* dashboard stats */
  .stats{display:flex;gap:10px;padding:0 18px 6px;margin-top:6px;}
  .stat{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;}
  .stat .num{font-family:var(--mono);font-size:22px;font-weight:700;}
  .stat .lbl{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:1px;}
  .stat.ok .num{color:var(--ok);} .stat.falla .num{color:var(--falla);}

  /* historial */
  .hist-card{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:10px;}
  .hist-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px;}
  .hist-top .name{font-weight:700;font-size:14px;color:var(--text);}
  .pill{font-size:10px;font-weight:700;text-transform:uppercase;padding:3px 8px;border-radius:99px;flex:none;}
  .pill.pendiente{background:var(--falla-dim);color:var(--falla);}
  .pill.reparado{background:var(--ok-dim);color:var(--ok);}
  .hist-row{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.5;}
  .hist-row b{color:var(--text);font-weight:600;}

  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center;z-index:50;}
  .modal-bg.show{display:flex;}
  .modal{background:#ffffff;border:1px solid var(--line);border-radius:18px 18px 0 0;padding:22px 20px 28px;max-width:760px;width:100%;max-height:88vh;overflow-y:auto;}
  .modal h3{margin:0 0 4px;font-size:16px;color:var(--text);}
  .modal .meta-line{font-size:12px;color:var(--muted);margin-bottom:14px;font-family:var(--mono);}
  label{display:block;font-size:12px;color:var(--muted);margin:14px 0 6px;font-weight:600;}
  label:first-of-type{margin-top:0;}
  input,select,textarea{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:9px;color:var(--text);padding:11px 12px;font-size:14px;font-family:inherit;}
  textarea{resize:vertical;min-height:64px;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--meli-blue);}
  .check-row{display:flex;align-items:center;gap:8px;margin-top:14px;font-size:13px;}
  .check-row input{width:auto;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:18px;}
  .btn{padding:12px;border-radius:10px;border:none;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;}
  .btn-primary{background:var(--meli-blue);color:#ffffff;}
  .btn-primary:hover{background:var(--meli-blue-dark);}
  .btn-ok{background:var(--ok);color:#ffffff;}
  .btn-ghost{background:var(--panel2);border:1px solid var(--line);color:var(--muted);}

  .toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%) translateY(20px);background:#2d2d2d;color:#fff;border:1px solid var(--line);padding:11px 18px;border-radius:10px;font-size:13px;opacity:0;transition:.25s;z-index:60;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div>
      <h1>Control de Site</h1>
      <div class="meta" id="metaLine">cargando…</div>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" id="btnRefresh" title="Actualizar">⟳</button>
      <button class="btn-falla" id="btnAbrirFalla">🚩 Falla</button>
    </div>
  </div>

  <div class="banner" id="banner" style="display:none;">
    🟠 Fallas urgentes pendientes <span class="count" id="bannerCount">0</span>
  </div>

  <div class="stats" id="dashStats" style="display:none;">
    <div class="stat ok"><div class="num" id="numOk">0</div><div class="lbl">OK</div></div>
    <div class="stat falla"><div class="num" id="numFalla">0</div><div class="lbl">Con falla</div></div>
  </div>

  <div class="chips" id="chips"></div>

  <main id="viewDashboard"></main>
  <main id="viewHistorial" style="display:none;"></main>
  <main id="viewEquipos" style="display:none;"></main>

  <nav class="bottom">
    <button data-view="dashboard" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
      Dashboard
    </button>
    <button data-view="historial">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
      Historial
    </button>
    <button data-view="equipos">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Equipos
    </button>
    <button data-view="fallas">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4v16M4 4h13l-3 4 3 4H4"/></svg>
      Fallas
      <span class="nav-badge" id="navBadge" style="display:none;">0</span>
    </button>
  </nav>
</div>

<!-- MODAL REPORTAR -->
<div class="modal-bg" id="modalReportar">
  <div class="modal">
    <h3>Reportar falla</h3>
    <div class="meta-line">Cualquiera puede reportar — solo escribe tu nombre.</div>
    <label>Tu nombre</label>
    <input id="repNombre" placeholder="Ej. María / Limpieza turno tarde">
    <label>Equipo / ubicación</label>
    <select id="repEquipo"></select>
    <label>¿Qué pasó?</label>
    <textarea id="repProblema" placeholder="No prende, fuga de agua, jabón vacío, etc."></textarea>
    <div class="check-row"><input type="checkbox" id="repUrgente"><label style="margin:0;" for="repUrgente">Marcar como urgente</label></div>
    <label>Foto (opcional)</label>
    <input type="file" id="repFoto" accept="image/*" capture="environment">
    <img id="repFotoPreview" style="display:none;margin-top:8px;max-width:100%;border-radius:10px;border:1px solid var(--line);">
    <div class="row2">
      <button class="btn btn-ghost" id="cerrarReportar">Cancelar</button>
      <button class="btn btn-primary" id="enviarReportar">Enviar reporte</button>
    </div>
  </div>
</div>

<!-- MODAL REPARAR -->
<div class="modal-bg" id="modalReparar">
  <div class="modal">
    <h3 id="reparaTitulo">Reparar</h3>
    <div class="meta-line" id="reparaMeta"></div>
    <label>Tu nombre (técnico)</label>
    <input id="repTecnico" placeholder="Tu nombre">
    <label>¿Qué tenía? / solución aplicada</label>
    <textarea id="repSolucion" placeholder="Ej. válvula dañada, se reemplazó."></textarea>
    <label>¿Se usaron refacciones?</label>
    <select id="repUsoRefacciones">
      <option value="no">No</option>
      <option value="si">Sí</option>
    </select>
    <div id="refaccionesBox" style="display:none;">
      <label>¿Cuáles?</label>
      <input id="repRefacciones" placeholder="Ej. válvula de 1/2 pulgada">
    </div>
    <div class="row2">
      <button class="btn btn-ghost" id="cerrarReparar">Cancelar</button>
      <button class="btn btn-ok" id="guardarReparar">Marcar reparado</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let equipos = {};   // id -> {nombre, grupo, subgrupo, estado, urgente, reporteActivoId}
let reportes = {};  // id -> {...}
let activeEquipoId = null;
let fotoActual = null;
let filtro = 'todos';
let view = 'dashboard';

const DEFAULT_STRUCTURE = [
  { grupo: 'Lobby', subs: [
    { nombre: 'Módulo 1', n: 6 },
    { nombre: 'Módulo 2', n: 8 },
    { nombre: 'Módulo 3', n: 8 },
    { nombre: 'Módulo 4', n: 8 },
    { nombre: 'Módulo 5', n: 12 },
  ]},
  { grupo: 'OB — Internos', subs: [
    { nombre: 'Módulo 1', n: 7 },
    { nombre: 'Módulo 2', n: 7 },
    { nombre: 'Módulo 3', n: 7 },
  ]},
  { grupo: 'IB — Internos', subs: [
    { nombre: 'Módulo 1', n: 7 },
    { nombre: 'Módulo 2', n: 7 },
    { nombre: 'Módulo 3', n: 7 },
  ]},
  { grupo: 'OB — Externos', subs: [
    { nombre: 'Módulo 1', n: 4 },
    { nombre: 'Módulo 2', n: 4 },
    { nombre: 'Módulo 3', n: 4 },
  ]},
  { grupo: 'IB — Externos', subs: [
    { nombre: 'Módulo 1', n: 4 },
    { nombre: 'Módulo 2', n: 4 },
    { nombre: 'Módulo 3', n: 4 },
  ]},
];

// Baños sueltos (uno solo por ubicación, no forman parte de un módulo)
const BANIOS_SUELTOS = ['CCM', 'SM', 'Caseta 1', 'Caseta 2'];

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function fmt(ts){ return new Date(ts).toLocaleString('es-MX',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}); }
function esc(s){ const d=document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

function resizeImage(file, maxW=900, quality=0.7){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        const scale = Math.min(1, maxW / img.width);
        const canvas = document.createElement('canvas');
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ==== CONFIGURACIÓN DE FIREBASE ====
// Reemplaza estos valores con los de TU proyecto (ver instrucciones que te dio Claude)
const firebaseConfig = {
  apiKey: "AIzaSyCklX3TgmOWi1u8PajJjxPgfFM0hgP0a2k",
  authDomain: "control-site-1d6c3.firebaseapp.com",
  databaseURL: "https://control-site-1d6c3-default-rtdb.firebaseio.com",
  projectId: "control-site-1d6c3"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
// ====================================

async function seedIfEmpty(){
  if(Object.keys(equipos).length) return;
  const nuevos = {};
  DEFAULT_STRUCTURE.forEach(g=>{
    g.subs.forEach(s=>{
      for(let i=1;i<=s.n;i++){
        const id = uid();
        nuevos[id] = { nombre: 'Baño '+i, grupo: g.grupo, subgrupo: s.nombre, estado:'ok', urgente:false, reporteActivoId:null };
        equipos[id] = nuevos[id];
      }
    });
  });
  BANIOS_SUELTOS.forEach(nombre=>{
    const id = uid();
    nuevos[id] = { nombre, grupo: 'Otros', subgrupo: 'General', estado:'ok', urgente:false, reporteActivoId:null };
    equipos[id] = nuevos[id];
  });
  await saveEquipos();
}

async function saveEquipos(){ try{ await db.ref('equipos').set(equipos); }catch(e){ showToast('Error guardando (revisa tu conexión / configuración Firebase)'); } }
async function saveReportes(){ try{ await db.ref('reportes').set(reportes); }catch(e){ showToast('Error guardando (revisa tu conexión / configuración Firebase)'); } }

// Escucha en tiempo real: en cuanto alguien reporta o repara, todos los demás lo ven sin recargar.
let primeraCargaEquipos = true;
db.ref('equipos').on('value', async (snap)=>{
  equipos = snap.val() || {};
  if(primeraCargaEquipos){
    primeraCargaEquipos = false;
    await seedIfEmpty();
  }
  render();
});
db.ref('reportes').on('value', (snap)=>{
  reportes = snap.val() || {};
  render();
});

function render(){
  document.getElementById('metaLine').textContent = '● Actualizado ' + new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
  renderBanner();
  renderChips();
  renderSelectEquipo();
  if(view==='dashboard' || view==='fallas') renderDashboard();
  if(view==='historial') renderHistorial();
  if(view==='equipos') renderEquiposAdmin();
}

function renderBanner(){
  const urgentes = Object.values(equipos).filter(e=>e.estado==='falla' && e.urgente).length;
  document.getElementById('banner').style.display = urgentes>0 ? 'flex' : 'none';
  document.getElementById('bannerCount').textContent = urgentes;
  const fallas = Object.values(equipos).filter(e=>e.estado==='falla').length;
  const ok = Object.keys(equipos).length - fallas;
  document.getElementById('numOk').textContent = ok;
  document.getElementById('numFalla').textContent = fallas;
  document.getElementById('dashStats').style.display = (view==='dashboard'||view==='fallas') ? 'flex' : 'none';
  const navBadge = document.getElementById('navBadge');
  if(fallas>0){ navBadge.style.display='block'; navBadge.textContent = fallas; } else { navBadge.style.display='none'; }
}

function renderChips(){
  const chips = [
    {k:'todos', l:'Todos'},
    {k:'pendientes', l:'Pendientes'},
    {k:'falla', l:'Con falla'},
    {k:'ok', l:'OK'},
  ];
  const box = document.getElementById('chips');
  box.style.display = (view==='dashboard'||view==='fallas') ? 'flex' : 'none';
  box.innerHTML = '';
  chips.forEach(c=>{
    const b = document.createElement('button');
    b.className = 'chip' + (filtro===c.k ? ' active' : '');
    b.textContent = c.l;
    b.addEventListener('click', ()=>{ filtro = c.k; render(); });
    box.appendChild(b);
  });
}

function matchesFiltro(eq){
  if(filtro==='todos') return true;
  if(filtro==='falla' || filtro==='pendientes') return eq.estado==='falla';
  if(filtro==='ok') return eq.estado==='ok';
  return true;
}

function renderDashboard(){
  const target = document.getElementById('viewDashboard');
  let html = '';
  let forceFallaOnly = (view==='fallas');
  const groups = {};
  Object.entries(equipos).forEach(([id,eq])=>{
    if(forceFallaOnly && eq.estado!=='falla') return;
    if(!forceFallaOnly && !matchesFiltro(eq)) return;
    const key = eq.grupo || 'Sin grupo';
    groups[key] = groups[key] || {};
    const subkey = eq.subgrupo || 'General';
    groups[key][subkey] = groups[key][subkey] || [];
    groups[key][subkey].push([id, eq]);
  });
  const groupKeys = Object.keys(groups);
  if(!groupKeys.length){
    html = '<div class="empty">No hay equipos que coincidan con el filtro.</div>';
  }
  groupKeys.forEach(g=>{
    html += `<div class="group-title">${esc(g)}</div>`;
    Object.keys(groups[g]).forEach(sub=>{
      html += `<div class="sub-title">${esc(sub)}</div><div class="items">`;
      groups[g][sub].forEach(([id,eq])=>{
        const cls = eq.estado==='falla' ? (eq.urgente ? 'falla urgente' : 'falla') : '';
        html += `<div class="item ${cls}" data-id="${id}"><span class="dot"></span>${esc(eq.nombre)}${eq.estado==='falla' ? '<span class="flag">🚩</span>' : ''}</div>`;
      });
      html += `</div>`;
    });
  });
  target.innerHTML = html;
  target.querySelectorAll('.item').forEach(it=>{
    it.addEventListener('click', ()=>{
      const id = it.dataset.id;
      const eq = equipos[id];
      if(eq.estado==='falla') openReparar(id);
      else openReportar(id);
    });
  });
}

function renderSelectEquipo(){
  const sel = document.getElementById('repEquipo');
  const cur = sel.value;
  sel.innerHTML = '';
  Object.entries(equipos).sort((a,b)=> (a[1].grupo+a[1].subgrupo+a[1].nombre).localeCompare(b[1].grupo+b[1].subgrupo+b[1].nombre))
  .forEach(([id,eq])=>{
    const opt = document.createElement('option');
    opt.value = id;
    opt.textContent = `${eq.grupo} · ${eq.subgrupo} · ${eq.nombre}`;
    sel.appendChild(opt);
  });
  if(Object.keys(equipos).includes(cur)) sel.value = cur;
}

function renderHistorial(){
  const target = document.getElementById('viewHistorial');
  const list = Object.values(reportes).sort((a,b)=> b.fecha - a.fecha);
  if(!list.length){ target.innerHTML = '<div class="empty">Sin reportes todavía.</div>'; return; }
  let html = '';
  list.forEach(r=>{
    html += `<div class="hist-card">
      <div class="hist-top">
        <div class="name">${esc(r.equipoNombre)} ${r.urgente ? '🟠' : ''}</div>
        <span class="pill ${r.estado}">${r.estado}</span>
      </div>
      <div class="hist-row"><b>Reportó:</b> ${esc(r.reportante)} — ${fmt(r.fecha)}</div>
      <div class="hist-row"><b>Problema:</b> ${esc(r.problema)}</div>
      ${r.foto ? `<img src="${r.foto}" style="margin-top:8px;max-width:100%;border-radius:9px;border:1px solid var(--line);">` : ''}
      ${r.estado==='reparado' ? `
        <div class="hist-row"><b>Reparó:</b> ${esc(r.tecnico)} — ${fmt(r.fechaReparacion)}</div>
        <div class="hist-row"><b>Solución:</b> ${esc(r.solucion)}</div>
        <div class="hist-row"><b>Refacciones:</b> ${r.usoRefacciones==='si' ? esc(r.refacciones||'—') : 'No se usaron'}</div>
      ` : ''}
    </div>`;
  });
  target.innerHTML = html;
}

function renderEquiposAdmin(){
  const target = document.getElementById('viewEquipos');
  let html = `
    <div class="group-title">Agregar equipo</div>
    <label>Grupo</label><input id="eqGrupo" placeholder="Ej. OB — Outbound">
    <label>Subgrupo</label><input id="eqSubgrupo" placeholder="Ej. Sellers Sección 1">
    <label>Nombre</label><input id="eqNombre" placeholder="Ej. Baño 8">
    <button class="btn btn-primary" id="btnAddEquipo" style="margin-top:14px;width:100%;">Agregar</button>
    <div class="group-title" style="margin-top:26px;">Equipos registrados (${Object.keys(equipos).length})</div>
  `;
  Object.entries(equipos).sort((a,b)=> (a[1].grupo+a[1].subgrupo+a[1].nombre).localeCompare(b[1].grupo+b[1].subgrupo+b[1].nombre))
  .forEach(([id,eq])=>{
    html += `<div class="hist-card" style="display:flex;align-items:center;justify-content:space-between;">
      <div>
        <div style="font-weight:600;font-size:13.5px;">${esc(eq.nombre)} <span class="pill ${eq.estado==='falla'?'pendiente':'reparado'}">${eq.estado}</span></div>
        <div class="hist-row" style="margin-top:2px;">${esc(eq.grupo)} · ${esc(eq.subgrupo)}</div>
      </div>
      <button class="btn btn-ghost" style="width:auto;padding:7px 12px;font-size:11px;" data-del="${id}">Eliminar</button>
    </div>`;
  });
  target.innerHTML = html;
  document.getElementById('btnAddEquipo').addEventListener('click', async ()=>{
    const grupo = document.getElementById('eqGrupo').value.trim();
    const subgrupo = document.getElementById('eqSubgrupo').value.trim();
    const nombre = document.getElementById('eqNombre').value.trim();
    if(!grupo || !subgrupo || !nombre){ showToast('Completa grupo, subgrupo y nombre.'); return; }
    const id = uid();
    equipos[id] = { nombre, grupo, subgrupo, estado:'ok', urgente:false, reporteActivoId:null };
    await saveEquipos();
    showToast('Equipo agregado.');
    render();
  });
  target.querySelectorAll('[data-del]').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      if(!confirm('¿Eliminar este equipo? Su historial de reportes se conserva.')) return;
      delete equipos[btn.dataset.del];
      await saveEquipos();
      render();
    });
  });
}

// Navegación
document.querySelectorAll('nav.bottom button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('nav.bottom button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    view = btn.dataset.view;
    document.getElementById('viewDashboard').style.display = (view==='dashboard'||view==='fallas') ? 'block' : 'none';
    document.getElementById('viewHistorial').style.display = view==='historial' ? 'block' : 'none';
    document.getElementById('viewEquipos').style.display = view==='equipos' ? 'block' : 'none';
    render();
  });
});
document.getElementById('btnRefresh').addEventListener('click', ()=>{ render(); showToast('Ya está sincronizado en tiempo real ✓'); });

// Reportar
function openReportar(prefId){
  document.getElementById('repNombre').value='';
  document.getElementById('repProblema').value='';
  document.getElementById('repUrgente').checked=false;
  document.getElementById('repFoto').value='';
  document.getElementById('repFotoPreview').style.display='none';
  document.getElementById('repFotoPreview').removeAttribute('src');
  fotoActual = null;
  renderSelectEquipo();
  if(prefId) document.getElementById('repEquipo').value = prefId;
  document.getElementById('modalReportar').classList.add('show');
}
document.getElementById('btnAbrirFalla').addEventListener('click', ()=>openReportar(null));
document.getElementById('cerrarReportar').addEventListener('click', ()=> document.getElementById('modalReportar').classList.remove('show'));
document.getElementById('repFoto').addEventListener('change', async (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  showToast('Procesando foto…');
  try{
    fotoActual = await resizeImage(file);
    const prev = document.getElementById('repFotoPreview');
    prev.src = fotoActual;
    prev.style.display = 'block';
  }catch(err){ showToast('No se pudo cargar la foto.'); }
});
document.getElementById('enviarReportar').addEventListener('click', async ()=>{
  const nombre = document.getElementById('repNombre').value.trim();
  const equipoId = document.getElementById('repEquipo').value;
  const problema = document.getElementById('repProblema').value.trim();
  const urgente = document.getElementById('repUrgente').checked;
  if(!equipoId){ showToast('No hay equipos registrados.'); return; }
  if(!nombre || !problema){ showToast('Completa tu nombre y el problema.'); return; }
  const id = uid();
  const eq = equipos[equipoId];
  reportes[id] = { equipoId, equipoNombre: `${eq.grupo} · ${eq.subgrupo} · ${eq.nombre}`, reportante: nombre, problema, fecha: Date.now(), estado:'pendiente', urgente, foto: fotoActual };
  eq.estado = 'falla';
  eq.urgente = urgente;
  eq.reporteActivoId = id;
  await saveReportes(); await saveEquipos();
  document.getElementById('modalReportar').classList.remove('show');
  showToast('Reporte enviado.');
  render();
});

// Reparar
function openReparar(id){
  activeEquipoId = id;
  const eq = equipos[id];
  const rep = eq.reporteActivoId ? reportes[eq.reporteActivoId] : null;
  document.getElementById('reparaTitulo').textContent = 'Reparar: ' + eq.nombre;
  document.getElementById('reparaMeta').innerHTML = rep
    ? `Reportó ${esc(rep.reportante)} · ${fmt(rep.fecha)} · "${esc(rep.problema)}"` + (rep.foto ? `<br><img src="${rep.foto}" style="margin-top:8px;max-width:100%;border-radius:9px;border:1px solid var(--line);">` : '')
    : 'Sin detalle.';
  document.getElementById('repTecnico').value='';
  document.getElementById('repSolucion').value='';
  document.getElementById('repUsoRefacciones').value='no';
  document.getElementById('repRefacciones').value='';
  document.getElementById('refaccionesBox').style.display='none';
  document.getElementById('modalReparar').classList.add('show');
}
document.getElementById('cerrarReparar').addEventListener('click', ()=> document.getElementById('modalReparar').classList.remove('show'));
document.getElementById('repUsoRefacciones').addEventListener('change', e=>{
  document.getElementById('refaccionesBox').style.display = e.target.value==='si' ? 'block' : 'none';
});
document.getElementById('guardarReparar').addEventListener('click', async ()=>{
  const tecnico = document.getElementById('repTecnico').value.trim();
  const solucion = document.getElementById('repSolucion').value.trim();
  const usoRefacciones = document.getElementById('repUsoRefacciones').value;
  const refacciones = document.getElementById('repRefacciones').value.trim();
  if(!tecnico || !solucion){ showToast('Completa tu nombre y la solución.'); return; }
  const eq = equipos[activeEquipoId];
  if(eq.reporteActivoId && reportes[eq.reporteActivoId]){
    const rep = reportes[eq.reporteActivoId];
    rep.estado='reparado'; rep.tecnico=tecnico; rep.solucion=solucion;
    rep.usoRefacciones=usoRefacciones; rep.refacciones=refacciones; rep.fechaReparacion=Date.now();
  }
  eq.estado='ok'; eq.urgente=false; eq.reporteActivoId=null;
  await saveReportes(); await saveEquipos();
  document.getElementById('modalReparar').classList.remove('show');
  showToast('Equipo marcado como reparado.');
  render();
});

// Nota: la carga inicial y la sincronización ya las maneja db.ref(...).on('value', ...) arriba.
