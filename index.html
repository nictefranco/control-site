<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Control de Site</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
  :root{
    --bg:#f7f7f7;
    --panel:#ffffff;
    --panel2:#f5f5f5;
    --line:#e6e6e6;
    --text:#333333;
    --muted:#999999;
    --meli-yellow:#fff159;
    --meli-blue:#3483fa;
    --meli-blue-dark:#2968c8;
    --ok:#39b54a;
    --ok-dim:rgba(57,181,74,.10);
    --falla:#e63946;
    --falla-dim:rgba(230,57,70,.08);
    --urgente:#f5a623;
    --urgente-dim:rgba(245,166,35,.12);
    --mono:'JetBrains Mono','SF Mono',Consolas,monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Proxima Nova',Inter,-apple-system,Segoe UI,Roboto,sans-serif;}
  .app{max-width:760px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

  /* LOGIN */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--meli-yellow);padding:20px;}
  .login-box{background:#fff;border-radius:18px;padding:32px 28px;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.10);}
  .login-logo{font-size:22px;font-weight:900;color:#333;margin-bottom:4px;}
  .login-sub{font-size:13px;color:var(--muted);margin-bottom:24px;}
  .login-box label{display:block;font-size:12px;color:var(--muted);margin:14px 0 6px;font-weight:600;}
  .login-box label:first-of-type{margin-top:0;}
  .login-box input{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:9px;color:var(--text);padding:12px 14px;font-size:15px;font-family:inherit;}
  .login-box input:focus{outline:none;border-color:var(--meli-blue);}
  .btn-login{width:100%;background:var(--meli-blue);color:#fff;border:none;border-radius:10px;padding:14px;font-weight:700;font-size:15px;cursor:pointer;margin-top:20px;font-family:inherit;}
  .btn-login:hover{background:var(--meli-blue-dark);}
  .login-error{color:var(--falla);font-size:13px;text-align:center;margin-top:12px;display:none;}
  .role-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;}
  .role-badge.admin{background:rgba(52,131,250,.12);color:var(--meli-blue);}
  .role-badge.tecnico{background:var(--ok-dim);color:var(--ok);}
  .role-badge.general{background:var(--urgente-dim);color:var(--urgente);}

  /* TOPBAR */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 18px 10px;background:var(--meli-yellow);}
  .topbar-left{display:flex;flex-direction:column;}
  .topbar h1{font-size:17px;margin:0;font-weight:800;letter-spacing:.2px;color:#2d2d2d;}
  .topbar .meta{font-size:10px;color:#4a4a4a;font-family:var(--mono);margin-top:1px;}
  .topbar-right{display:flex;align-items:center;gap:7px;}
  .icon-btn{background:#ffffff;border:1px solid rgba(0,0,0,.12);color:#5a5a5a;width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;}
  .btn-falla{background:var(--falla);color:#ffffff;border:none;border-radius:9px;padding:0 14px;height:32px;font-weight:700;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;}
  .user-chip{display:flex;align-items:center;gap:6px;background:rgba(0,0,0,.08);border-radius:99px;padding:4px 10px 4px 6px;cursor:pointer;}
  .user-chip .avatar{width:22px;height:22px;border-radius:50%;background:var(--meli-blue);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;}
  .user-chip .uname{font-size:11px;font-weight:700;color:#333;}

  .banner{margin:8px 18px 4px;background:var(--urgente-dim);border:1px solid rgba(245,166,35,.4);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;color:#a86d00;}
  .banner .count{margin-left:auto;background:rgba(245,166,35,.25);padding:2px 10px;border-radius:99px;font-family:var(--mono);}

  .chips{display:flex;gap:6px;padding:12px 18px 4px;overflow-x:auto;}
  .chip{flex:none;background:var(--panel);border:1px solid var(--line);color:var(--muted);padding:7px 14px;border-radius:99px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .chip.active{background:var(--meli-blue);color:#fff;border-color:var(--meli-blue);}

  main{flex:1;padding:6px 18px 90px;overflow-y:auto;}
  .group-title{font-size:11px;letter-spacing:.8px;color:var(--muted);text-transform:uppercase;margin:18px 0 8px;font-weight:700;}
  .sub-title{font-size:12.5px;color:var(--text);margin:10px 0 7px;font-weight:600;}
  .items{display:flex;flex-wrap:wrap;gap:7px;}
  .item{border:1px solid var(--line);background:var(--panel);border-radius:10px;padding:8px 12px;font-size:13px;display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none;color:var(--text);}
  .item .dot{width:7px;height:7px;border-radius:50%;background:var(--ok);flex:none;}
  .item.falla{border-color:rgba(230,57,70,.35);background:var(--falla-dim);}
  .item.falla .dot{background:var(--falla);animation:pulse 1.4s infinite;}
  .item.urgente{border-color:rgba(245,166,35,.55);background:var(--urgente-dim);}
  .item.urgente .dot{background:var(--urgente);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
  .empty{color:var(--muted);font-size:13px;text-align:center;padding:40px 0;}

  nav.bottom{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);display:flex;max-width:760px;margin:0 auto;box-shadow:0 -2px 10px rgba(0,0,0,.04);}
  nav.bottom button{flex:1;background:none;border:none;color:var(--muted);padding:10px 4px 9px;font-size:10.5px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:inherit;position:relative;}
  nav.bottom button.active{color:var(--meli-blue);}
  nav.bottom svg{width:18px;height:18px;}
  .nav-badge{position:absolute;top:2px;right:16%;background:var(--falla);color:#fff;font-size:9px;font-weight:700;border-radius:99px;padding:1px 5px;min-width:14px;text-align:center;}

  .stats{display:flex;gap:10px;padding:0 18px 4px;margin-top:6px;}
  .stat{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 14px;}
  .stat .num{font-family:var(--mono);font-size:22px;font-weight:700;}
  .stat .lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:1px;}
  .stat.ok .num{color:var(--ok);} .stat.falla .num{color:var(--falla);}

  .hist-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:10px;}
  .hist-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px;}
  .hist-top .name{font-weight:700;font-size:14px;color:var(--text);}
  .pill{font-size:10px;font-weight:700;text-transform:uppercase;padding:3px 8px;border-radius:99px;flex:none;}
  .pill.pendiente{background:var(--falla-dim);color:var(--falla);}
  .pill.reparado{background:var(--ok-dim);color:var(--ok);}
  .hist-row{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.5;}
  .hist-row b{color:var(--text);font-weight:600;}

  /* MODAL */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center;z-index:50;}
  .modal-bg.show{display:flex;}
  .modal{background:#fff;border-radius:18px 18px 0 0;padding:22px 20px 30px;max-width:760px;width:100%;max-height:88vh;overflow-y:auto;}
  .modal h3{margin:0 0 4px;font-size:16px;color:var(--text);}
  .modal .meta-line{font-size:12px;color:var(--muted);margin-bottom:14px;}
  label{display:block;font-size:12px;color:var(--muted);margin:14px 0 6px;font-weight:600;}
  label:first-of-type{margin-top:0;}
  input,select,textarea{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:9px;color:var(--text);padding:11px 12px;font-size:14px;font-family:inherit;}
  textarea{resize:vertical;min-height:64px;}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--meli-blue);}
  .check-row{display:flex;align-items:center;gap:8px;margin-top:14px;font-size:13px;}
  .check-row input{width:auto;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:18px;}
  .btn{padding:12px;border-radius:10px;border:none;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit;width:100%;}
  .btn-primary{background:var(--meli-blue);color:#fff;}
  .btn-primary:hover{background:var(--meli-blue-dark);}
  .btn-ok{background:var(--ok);color:#fff;}
  .btn-ghost{background:var(--panel2);border:1px solid var(--line);color:var(--muted);}
  .btn-danger{background:var(--falla);color:#fff;}
  .section-title{font-size:14px;font-weight:700;margin:22px 0 12px;color:var(--text);}

  /* USUARIOS */
  .user-card{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .user-card .uinfo{display:flex;align-items:center;gap:10px;}
  .user-card .avatar-lg{width:36px;height:36px;border-radius:50%;background:var(--meli-blue);color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:none;}
  .user-card .uname{font-weight:700;font-size:14px;}
  .user-card .urole{font-size:11px;color:var(--muted);margin-top:1px;}
  .btn-sm{background:var(--falla-dim);color:var(--falla);border:none;border-radius:7px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;}

  .toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%) translateY(20px);background:#2d2d2d;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;opacity:0;transition:.25s;z-index:60;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  .section-sep{height:1px;background:var(--line);margin:16px 0;}
</style>
</head>
<body>

<!-- PANTALLA DE LOGIN -->
<div id="loginWrap" class="login-wrap">
  <div class="login-box">
    <div class="login-logo">Control de Site</div>
    <div class="login-sub">Ingresa tus credenciales para continuar</div>
    <label>Usuario</label>
    <input id="loginUser" placeholder="Tu usuario" autocomplete="username">
    <label>PIN</label>
    <input id="loginPin" type="password" placeholder="••••" maxlength="8" autocomplete="current-password">
    <button class="btn-login" id="btnLogin">Entrar</button>
    <div class="login-error" id="loginError">Usuario o PIN incorrecto.</div>
  </div>
</div>

<!-- APP PRINCIPAL -->
<div class="app" id="mainApp" style="display:none;">
  <div class="topbar">
    <div class="topbar-left">
      <h1>Control de Site</h1>
      <div class="meta" id="metaLine">cargando…</div>
    </div>
    <div class="topbar-right">
      <div class="user-chip" id="userChip">
        <div class="avatar" id="userAvatar">?</div>
        <span class="uname" id="userNameTop"></span>
      </div>
      <button class="icon-btn" id="btnLogout" title="Cerrar sesión">⎋</button>
      <button class="btn-falla" id="btnAbrirFalla" style="display:none;">🚩 Falla</button>
    </div>
  </div>

  <div class="banner" id="banner" style="display:none;">
    🟠 Fallas urgentes pendientes <span class="count" id="bannerCount">0</span>
  </div>
  <div class="stats" id="dashStats" style="display:none;">
    <div class="stat ok"><div class="num" id="numOk">0</div><div class="lbl">OK</div></div>
    <div class="stat falla"><div class="num" id="numFalla">0</div><div class="lbl">Con falla</div></div>
  </div>
  <div class="chips" id="chips"></div>

  <main id="viewDashboard"></main>
  <main id="viewHistorial" style="display:none;"></main>
  <main id="viewEquipos" style="display:none;"></main>
  <main id="viewUsuarios" style="display:none;"></main>

  <nav class="bottom" id="bottomNav">
    <button data-view="dashboard" class="active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
      Dashboard
    </button>
    <button data-view="historial">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
      Historial
    </button>
    <button data-view="fallas">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4v16M4 4h13l-3 4 3 4H4"/></svg>
      Fallas
      <span class="nav-badge" id="navBadge" style="display:none;">0</span>
    </button>
    <button data-view="equipos" id="navEquipos" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Equipos
    </button>
    <button data-view="usuarios" id="navUsuarios" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Usuarios
    </button>
  </nav>
</div>

<!-- MODAL REPORTAR -->
<div class="modal-bg" id="modalReportar">
  <div class="modal">
    <h3>Reportar falla</h3>
    <div class="meta-line" id="reportarMeta"></div>
    <label>Equipo / ubicación</label>
    <select id="repEquipo"></select>
    <label>¿Qué pasó?</label>
    <textarea id="repProblema" placeholder="No prende, fuga de agua, jabón vacío, etc."></textarea>
    <div class="check-row"><input type="checkbox" id="repUrgente"><label style="margin:0;" for="repUrgente">Marcar como urgente</label></div>
    <label>Foto (opcional)</label>
    <input type="file" id="repFoto" accept="image/*" capture="environment">
    <img id="repFotoPreview" style="display:none;margin-top:8px;max-width:100%;border-radius:10px;border:1px solid var(--line);">
    <div class="row2">
      <button class="btn btn-ghost" id="cerrarReportar">Cancelar</button>
      <button class="btn btn-primary" id="enviarReportar">Enviar reporte</button>
    </div>
  </div>
</div>

<!-- MODAL REPARAR -->
<div class="modal-bg" id="modalReparar">
  <div class="modal">
    <h3 id="reparaTitulo">Reparar</h3>
    <div class="meta-line" id="reparaMeta"></div>
    <label>¿Qué tenía? / solución aplicada</label>
    <textarea id="repSolucion" placeholder="Ej. válvula dañada, se reemplazó."></textarea>
    <label>¿Se usaron refacciones?</label>
    <select id="repUsoRefacciones">
      <option value="no">No</option>
      <option value="si">Sí</option>
    </select>
    <div id="refaccionesBox" style="display:none;">
      <label>¿Cuáles?</label>
      <input id="repRefacciones" placeholder="Ej. válvula de 1/2 pulgada">
    </div>
    <div class="row2">
      <button class="btn btn-ghost" id="cerrarReparar">Cancelar</button>
      <button class="btn btn-ok" id="guardarReparar">Marcar reparado</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- MODAL EDITAR USUARIO -->
<div class="modal-bg" id="modalEditUser">
  <div class="modal">
    <h3>Editar usuario</h3>
    <div class="meta-line" id="editUserMeta"></div>
    <label>Nombre de usuario</label>
    <input id="editNombre" placeholder="Ej. juan">
    <label>Nuevo PIN <span style="font-weight:400;color:var(--muted)">(deja vacío para no cambiar)</span></label>
    <div style="position:relative;">
      <input id="editPin" type="password" placeholder="••••" maxlength="20" style="padding-right:40px;">
      <button id="editPinEye" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:15px;color:var(--muted);">👁</button>
    </div>
    <label>Rol</label>
    <select id="editRol">
      <option value="general">General (solo reportar)</option>
      <option value="tecnico">Técnico (reportar + reparar)</option>
      <option value="admin">Administrador (acceso total)</option>
    </select>
    <div class="row2">
      <button class="btn btn-ghost" id="cerrarEditUser">Cancelar</button>
      <button class="btn btn-primary" id="guardarEditUser">Guardar cambios</button>
    </div>
  </div>
</div>

<script>
// ========== ESTADO ==========
let equipos = {};
let reportes = {};
let usuarios = {};
let activeEquipoId = null;
let fotoActual = null;
let filtro = 'todos';
let view = 'dashboard';
let sesion = null; // { id, nombre, rol }

// ========== ESTRUCTURA DEFAULT ==========
const DEFAULT_STRUCTURE = [
  { grupo: 'Lobby', subs: [
    { nombre: 'Módulo 1', n: 6 },{ nombre: 'Módulo 2', n: 8 },
    { nombre: 'Módulo 3', n: 8 },{ nombre: 'Módulo 4', n: 8 },{ nombre: 'Módulo 5', n: 12 },
  ]},
  { grupo: 'OB — Internos', subs: [
    { nombre: 'Módulo 1', n: 7 },{ nombre: 'Módulo 2', n: 7 },{ nombre: 'Módulo 3', n: 7 },
  ]},
  { grupo: 'IB — Internos', subs: [
    { nombre: 'Módulo 1', n: 7 },{ nombre: 'Módulo 2', n: 7 },{ nombre: 'Módulo 3', n: 7 },
  ]},
  { grupo: 'OB — Externos', subs: [
    { nombre: 'Módulo 1', n: 4 },{ nombre: 'Módulo 2', n: 4 },{ nombre: 'Módulo 3', n: 4 },
  ]},
  { grupo: 'IB — Externos', subs: [
    { nombre: 'Módulo 1', n: 4 },{ nombre: 'Módulo 2', n: 4 },{ nombre: 'Módulo 3', n: 4 },
  ]},
];
const BANIOS_SUELTOS = ['CCM', 'SM', 'Caseta 1', 'Caseta 2'];

// ========== FIREBASE ==========
const firebaseConfig = {
  apiKey: "AIzaSyCklX3TgmOWi1u8PajJjxPgfFM0hgP0a2k",
  authDomain: "control-site-1d6c3.firebaseapp.com",
  databaseURL: "https://control-site-1d6c3-default-rtdb.firebaseio.com",
  projectId: "control-site-1d6c3"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ========== UTILIDADES ==========
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function fmt(ts){ return new Date(ts).toLocaleString('es-MX',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}); }
function esc(s){ const d=document.createElement('div'); d.textContent=s??''; return d.innerHTML; }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2300); }
function initials(n){ return (n||'?').trim().slice(0,2).toUpperCase(); }

function rolLabel(r){ return r==='admin'?'Administrador':r==='tecnico'?'Técnico':'General'; }
function rolBadge(r){
  const map={admin:'admin',tecnico:'tecnico',general:'general'};
  return `<span class="role-badge ${map[r]||''}">${rolLabel(r)}</span>`;
}

// ========== GUARDAR ==========
async function saveEquipos(){ try{ await db.ref('equipos').set(equipos); }catch(e){ showToast('Error al guardar'); } }
async function saveReportes(){ try{ await db.ref('reportes').set(reportes); }catch(e){ showToast('Error al guardar'); } }
async function saveUsuarios(){ try{ await db.ref('usuarios').set(usuarios); }catch(e){ showToast('Error al guardar'); } }

// ========== SEED ==========
async function seedEquiposIfEmpty(){
  if(Object.keys(equipos).length) return;
  DEFAULT_STRUCTURE.forEach(g=>{
    g.subs.forEach(s=>{
      for(let i=1;i<=s.n;i++){
        const id=uid();
        equipos[id]={nombre:'Baño '+i,grupo:g.grupo,subgrupo:s.nombre,estado:'ok',urgente:false,reporteActivoId:null};

    });
  });
  BANIOS_SUELTOS.forEach(nombre=>{
    const id=uid();
    equipos[id]={nombre,grupo:'Otros',subgrupo:'General',estado:'ok',urgente:false,reporteActivoId:null};

}

function render(){
  if(!sesion) return;
  document.getElementById('metaLine').textContent = '● Actualizado '+new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
  renderBanner();
  renderChips();
  renderSelectEquipo();
  if(view==='dashboard'||view==='fallas') renderDashboard();
  if(view==='historial') renderHistorial();
  if(view==='equipos') renderEquiposAdmin();
  if(view==='usuarios') renderUsuariosAdmin();
}

function renderBanner(){
  const urgentes=Object.values(equipos).filter(e=>e.estado==='falla'&&e.urgente).length;
  document.getElementById('banner').style.display=urgentes>0?'flex':'none';
  document.getElementById('bannerCount').textContent=urgentes;
  const fallas=Object.values(equipos).filter(e=>e.estado==='falla').length;
  const ok=Object.keys(equipos).length-fallas;
  document.getElementById('numOk').textContent=ok;
  document.getElementById('numFalla').textContent=fallas;
  document.getElementById('dashStats').style.display=(view==='dashboard'||view==='fallas')?'flex':'none';
  const nb=document.getElementById('navBadge');
  if(fallas>0){nb.style.display='block';nb.textContent=fallas;}else{nb.style.display='none';}
}

function renderChips(){
  const chips=[{k:'todos',l:'Todos'},{k:'pendientes',l:'Pendientes'},{k:'falla',l:'Con falla'},{k:'ok',l:'OK'}];
  const box=document.getElementById('chips');
  box.style.display=(view==='dashboard'||view==='fallas')?'flex':'none';
  box.innerHTML='';
  chips.forEach(c=>{
    const b=document.createElement('button');
    b.className='chip'+(filtro===c.k?' active':'');
    b.textContent=c.l;
    b.addEventListener('click',()=>{filtro=c.k;render();});
    box.appendChild(b);
  });
}

function matchesFiltro(eq){
  if(filtro==='todos') return true;
  if(filtro==='falla'||filtro==='pendientes') return eq.estado==='falla';
  if(filtro==='ok') return eq.estado==='ok';
  return true;
}

function renderDashboard(){
  const target=document.getElementById('viewDashboard');
  const forceFalla=(view==='fallas');
  const groups={};
  Object.entries(equipos).forEach(([id,eq])=>{
    if(forceFalla&&eq.estado!=='falla') return;
    if(!forceFalla&&!matchesFiltro(eq)) return;
    const g=eq.grupo||'Sin grupo';
    groups[g]=groups[g]||{};
    const s=eq.subgrupo||'General';
    groups[g][s]=groups[g][s]||[];
    groups[g][s].push([id,eq]);
  });
  const keys=Object.keys(groups);
  if(!keys.length){target.innerHTML='<div class="empty">No hay equipos que coincidan.</div>';return;}
  let html='';
  keys.forEach(g=>{
    html+=`<div class="group-title">${esc(g)}</div>`;
    Object.keys(groups[g]).forEach(s=>{
      html+=`<div class="sub-title">${esc(s)}</div><div class="items">`;
      groups[g][s].forEach(([id,eq])=>{
        const cls=eq.estado==='falla'?(eq.urgente?'falla urgente':'falla'):'';
        html+=`<div class="item ${cls}" data-id="${id}"><span class="dot"></span>${esc(eq.nombre)}${eq.estado==='falla'?'<span style="font-size:11px">🚩</span>':''}</div>`;
      });
      html+=`</div>`;
    });
  });
  target.innerHTML=html;
  target.querySelectorAll('.item').forEach(it=>{
    it.addEventListener('click',()=>{
      const id=it.dataset.id;
      const eq=equipos[id];
      if(eq.estado==='falla'){
        if(sesion.rol==='tecnico'||sesion.rol==='admin') openReparar(id);
        else showToast('Solo técnicos pueden marcar reparaciones.');
      } else {
        openReportar(id);
      }
    });
  });
}

  Object.entries(equipos)

function resizeImage(file,maxW=900,quality=0.7){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        const scale=Math.min(1,maxW/img.width);
        const canvas=document.createElement('canvas');
        canvas.width=img.width*scale; canvas.height=img.height*scale;
        canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
        res(canvas.toDataURL('image/jpeg',quality));
      };
      img.onerror=rej; img.src=e.target.result;
    };
    reader.onerror=rej; reader.readAsDataURL(file);
  });
}
document.getElementById('repFoto').addEventListener('change',async e=>{

  const eq=equipos[activeEquipoId];

  if(sesion){
    const sigue=Object.values(usuarios).some(u=>u.nombre===sesion.nombre&&u.pin);
    if(!sigue){ sessionStorage.removeItem('sesion_controlsite'); sesion=null; showLogin(); }
    else render();
  } else { checkSesion(); }
});

// Toque en el chip de usuario abre edición del propio perfil
document.getElementById('userChip').addEventListener('click',()=>{
  if(!sesion || !usuarios[sesion.id]) return;
  openEditUser(sesion.id, usuarios[sesion.id]);
});
</script>
</body>
</html>
